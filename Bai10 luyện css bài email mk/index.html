<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="login">
      <div class="header_login">
        <p class="title_login">Đăng nhập</p>

        <svg width="40" height="40" fill="none" class="WfRz00">
          <g clip-path="url(#clip0)">
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M18 0H0v18h18V0zM3 15V3h12v12H3zM18 22H0v18h18V22zm-3 15H3V25h12v12zM40 0H22v18h18V0zm-3 15H25V3h12v12z"
              fill="#EE4D2D"
            ></path>
            <path d="M37 37H22.5v3H40V22.5h-3V37z" fill="#EE4D2D"></path>
            <path
              d="M27.5 32v-8h-3v8h3zM33.5 32v-8h-3v8h3zM6 6h6v6H6zM6 28h6v6H6zM28 6h6v6h-6z"
              fill="#EE4D2D"
            ></path>
            <path fill="#fff" d="M-4.3 4l44 43.9-22.8 22.7-43.9-44z"></path>
          </g>
          <defs>
            <clipPath id="clip0">
              <path fill="#fff" d="M0 0h40v40H0z"></path>
            </clipPath>
          </defs>
        </svg>
      </div>

      <div class="input_login">
        <input
          class="input_login_email"
          type="text"
          placeholder="Email/Số điện thoại/Tên đăng nhập"
        />
        <p class="error-email"></p>
        <input
          class="input_login_password"
          type="text"
          placeholder="Mật khẩu"
        />
        <p class="error-password"></p>
      </div>

      <button class="btn_login">ĐĂNG NHẬP</button>
      <a href="">Quên mật khẩu</a>

      <div class="or_login">
        <p>HOẶC</p>
      </div>

      <div class="link_login">
        <a class="link_login_fb" href="">
          <i class="fa-brands fa-facebook"></i>
          Facebook
        </a>

        <a class="link_login_google" href="">
          <i class="fa-brands fa-google"></i>
          Google
        </a>
      </div>

      <div class="login_policy">
        <p>
          Bằng việc đăng nhập, bạn đồng ý với
          <a href="">Điều khoản dịch vụ</a> &
          <a href="">Chính xác bảo mật của Shopee</a>
        </p>
      </div>

      <div class="question_link">
        <p>Bạn mới biết đến Shopee? <a href="">Đăng ký</a></p>
      </div>
    </div>
  </body>

  <script src="main.js"></script>
</html>
