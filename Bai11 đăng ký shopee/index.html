<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="register">
      <p class="title-register">Đăng ký</p>

      <div class="phone-register">
        <input
          class="number-phone-register"
          type="text"
          placeholder="Số điện thoại"
        />
        <p class="error-username" style="color: red; padding: 10px"></p>
      </div>

      <div class="btn-next-register">
        <button>TIẾP THEO</button>
      </div>

      <div class="or_register">
        <span>HOẶC</span>
      </div>

      <div class="link_register">
        <a class="link_register_fb" href="">
          <i class="fa-brands fa-facebook"></i>
          Facebook
        </a>

        <a class="link_register_google" href="">
          <i class="fa-brands fa-google"></i>
          Google
        </a>
      </div>

      <div class="register_policy">
        <p>
          Bằng việc đăng nhập, bạn đồng ý với
          <a href="">Điều khoản dịch vụ</a> &
          <a href="">Chính sách bảo mật</a>
        </p>
      </div>

      <div class="question_link">
        <p>Bạn đã có tài khoản? <a href="">Đăng nhập</a></p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
