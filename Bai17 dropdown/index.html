<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header>
      <div class="user_menu">
        <i class="fa-solid fa-user icon_user"></i>

        <div class="user">
          <div class="user_header">
            <img src="https://i.pravatar.cc/80" alt="" />
            <div>
              <h3>Kasper Carlsen</h3>
              <p>Product Designer</p>
            </div>
          </div>

          <ul class="user_list">
            <li><i class="fa-regular fa-user"></i> View Profile</li>
            <li><i class="fa-solid fa-chart-column"></i> Analytics & Data</li>
            <li><i class="fa-regular fa-circle-question"></i> Help Center</li>
            <li><i class="fa-solid fa-gear"></i> Account Settings</li>
            <li><i class="fa-regular fa-star"></i> Upgrade Plan</li>
            <li><i class="fa-regular fa-moon"></i> Dark Mode</li>
            <li><i class="fa-solid fa-right-from-bracket"></i> Log Out</li>
          </ul>
        </div>
      </div>
    </header>

    <script src="main.js"></script>
  </body>
</html>
